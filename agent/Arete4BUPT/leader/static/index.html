<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人课程助手 — Arete4BUPT</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --primary: #1a73e8;
    --primary-light: #e8f0fe;
    --text: #202124;
    --text-secondary: #5f6368;
    --text-muted: #999;
    --bubble-user: #1a73e8;
    --bubble-bot: #ffffff;
    --border: #e0e0e0;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .app {
    width: 100%; max-width: 720px; height: 100vh; max-height: 900px;
    display: flex; flex-direction: column; background: var(--card);
    box-shadow: var(--shadow); overflow: hidden;
  }
  @media (min-width: 768px) {
    .app { border-radius: 12px; height: 90vh; }
  }

  .header {
    background: var(--primary); color: #fff; padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .badge {
    font-size: 11px; background: rgba(255,255,255,.18); padding: 5px 12px;
    border-radius: 20px; cursor: pointer; border: none; color: #fff;
  }

  .chat {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .chat::-webkit-scrollbar { width: 5px; }
  .chat::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

  .bubble {
    max-width: 85%; padding: 12px 16px; border-radius: var(--radius);
    line-height: 1.6; font-size: 15px;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } }
  .bubble.user {
    align-self: flex-end; background: var(--bubble-user); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start; background: var(--bubble-bot); color: var(--text);
    border: 1px solid var(--border); border-bottom-left-radius: 4px;
    white-space: pre-wrap;
  }

  .task-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .task-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 12px;
    background: var(--primary-light); color: var(--primary); font-weight: 500;
  }
  .task-tag.failed { background: #fce8e6; color: #c5221f; }

  /* ---- Pipeline progress bar ---- */
  .pipeline {
    align-self: flex-start; display: flex; align-items: center; gap: 6px;
    padding: 10px 16px; max-width: 100%; overflow-x: auto;
  }
  .p-stage {
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
    opacity: .35; transition: opacity .35s, color .35s;
  }
  .p-stage.done { opacity: 1; }
  .p-stage.active { opacity: 1; }
  .p-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--text-muted); flex-shrink: 0;
    transition: background .35s, transform .2s;
  }
  .p-stage.active .p-dot {
    background: var(--primary); transform: scale(1.35);
    animation: pulse-dot .9s infinite;
  }
  .p-stage.done .p-dot { background: var(--primary); }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(26,115,232,.4); }
    50% { box-shadow: 0 0 0 8px rgba(26,115,232,0); }
  }
  .p-label {
    font-size: 12px; color: var(--text-muted); font-weight: 500;
    transition: color .35s;
  }
  .p-stage.active .p-label, .p-stage.done .p-label { color: var(--primary); }
  .p-divider {
    width: 16px; height: 1px; background: var(--border); flex-shrink: 0;
  }

  /* Typewriter cursor */
  .cursor::after {
    content: '|'; color: var(--primary); animation: blink .8s infinite; margin-left: 1px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .input-bar {
    display: flex; gap: 10px; padding: 14px 16px;
    border-top: 1px solid var(--border); background: #fafafa; flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 24px; font-size: 15px; outline: none; transition: border .2s;
  }
  .input-bar input:focus { border-color: var(--primary); }
  .input-bar button {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--primary); color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
  }
  .input-bar button:hover { background: #1557b0; }
  .input-bar button:active { transform: scale(.94); }
  .input-bar button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

  .status {
    text-align: center; font-size: 11px; color: var(--text-secondary);
    padding: 6px; flex-shrink: 0; transition: color .3s;
  }
  .status.ok { color: #188038; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>个人课程助手</h1>
    <button class="badge" onclick="newSession()">新会话</button>
  </div>

  <div class="chat" id="chat">
    <div class="bubble bot">
👋 你好！我是北邮个人课程助手。

我可以帮你：
📚 选课 — 课程查询、方向推荐、先修检查
✍️ 请假 — 材料清单、申请流程、草稿生成
📅 考试提醒 — 时间查询、冲突检测
🔄 缓考 — 缓考条件判断、申请指导

直接告诉我你需要什么就好～
    </div>
  </div>

  <div class="status" id="status">就绪 — 4 个 Partner 在线</div>

  <div class="input-bar">
    <input id="input" type="text" placeholder="输入你的问题…" autofocus
           onkeydown="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">↑</button>
  </div>
</div>

<script>
const STAGES = [
  { key: 'intent',    label: '意图理解' },
  { key: 'discovery', label: 'ADP 发现' },
  { key: 'planning',  label: '任务分解' },
  { key: 'executing', label: '并行执行' },
  { key: 'aggregating', label: '结果聚合' },
];

let sessionId = 'sess-' + Date.now();
let pollTimer = null;
let pollDone = false;   // 防止竞态：true = 本次请求已终结，不再处理轮询回调
let msgSeq = 0;         // 每条消息唯一序号，避免 ID 冲突

function newSession() {
  sessionId = 'sess-' + Date.now();
  document.getElementById('chat').innerHTML = '';
  document.getElementById('status').textContent = '新会话 — 4 个 Partner 在线';
  document.getElementById('status').className = 'status';
}

function addBubble(role, html) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addPipeline(seq) {
  // 清理前一条 pipeline
  const old = document.querySelector('.pipeline');
  if (old) old.remove();

  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'pipeline';
  div.dataset.seq = seq;
  let html = '';
  STAGES.forEach((s, i) => {
    html += `<div class="p-stage" data-stage="${s.key}"><span class="p-dot"></span><span class="p-label">${s.label}</span></div>`;
    if (i < STAGES.length - 1) html += '<span class="p-divider"></span>';
  });
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function setStage(stageKey, seq) {
  const el = document.querySelector('.pipeline[data-seq="' + seq + '"]');
  if (!el) return;
  const stages = el.querySelectorAll('.p-stage');
  let found = false;
  stages.forEach(s => {
    const key = s.dataset.stage;
    s.classList.remove('active', 'done');
    if (key === stageKey) { s.classList.add('active'); found = true; }
    else if (!found) s.classList.add('done');
  });
}

async function typewriter(el, text, speed) {
  const chat = document.getElementById('chat');
  el.classList.add('cursor');
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    chat.scrollTop = chat.scrollHeight;
    await new Promise(r => setTimeout(r, speed || 18));
  }
  el.classList.remove('cursor');
}

async function send() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');
  const msg = input.value.trim();
  if (!msg) return;

  // 中断上一次轮询
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  pollDone = true;

  const seq = ++msgSeq;
  input.value = ''; input.disabled = true; btn.disabled = true;
  addBubble('user', msg);

  addPipeline(seq);
  setStage('intent', seq);
  statusEl.textContent = '意图分析中…';
  statusEl.className = 'status';

  pollDone = false;

  try {
    const submitResp = await fetch('/api/v1/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: msg })
    });
    const { session_id: sid } = await submitResp.json();
    if (sid) sessionId = sid;

    // 回复气泡（用序号去重）
    const botId = 'bot-ans-' + seq;
    const botBubble = addBubble('bot', '');
    botBubble.id = botId;

    pollTimer = setInterval(async () => {
      if (pollDone) return;
      try {
        const r = await fetch('/api/v1/result/' + sessionId);
        if (!r.ok || pollDone) return;
        const data = await r.json();
        if (pollDone) return;
        const st = data.status;
        const stage = data.stage || '';

        if (stage && stage !== 'completed') {
          setStage(stage, seq);
        }
        const labels = { intent:'意图分析中…', discovery:'发现可用的 Agent…',
          planning:'拆解子任务…', executing:'Partner 执行中…',
          aggregating:'整合结果中…' };
        statusEl.textContent = labels[stage] || '处理中…';

        if (st === 'completed' && data.message && !pollDone) {
          pollDone = true;
          clearInterval(pollTimer); pollTimer = null;
          statusEl.textContent = '完成';
          statusEl.className = 'status ok';

          // 所有阶段标 done
          const pl = document.querySelector('.pipeline[data-seq="' + seq + '"]');
          if (pl) {
            pl.querySelectorAll('.p-stage').forEach(s => { s.classList.add('done'); s.classList.remove('active'); });
          }

          const el = document.getElementById(botId);
          if (el) {
            el.textContent = '';
            await typewriter(el, data.message, 18);
            // 子任务标签
            const subs = data.task_detail?.subtasks || [];
            if (subs.length) {
              const tags = document.createElement('div');
              tags.className = 'task-tags';
              subs.forEach(n => {
                const t = document.createElement('span');
                t.className = 'task-tag'; t.textContent = n;
                tags.appendChild(t);
              });
              el.appendChild(tags);
            }
          }
        }

        if ((st === 'failed' || st === 'awaiting_input') && !pollDone) {
          pollDone = true;
          clearInterval(pollTimer); pollTimer = null;
          statusEl.textContent = st === 'failed' ? '出错了' : '需要更多信息';
          const el = document.getElementById(botId);
          if (el) el.textContent = data.message || '抱歉，出了点问题。';
        }
      } catch(e) { /* poll silently */ }
    }, 700);

  } catch (e) {
    pollDone = true;
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    const pl = document.querySelector('.pipeline[data-seq="' + seq + '"]');
    if (pl) pl.remove();
    addBubble('bot', '网络错误，请稍后重试。');
    statusEl.textContent = '连接失败';
    statusEl.className = 'status';
  }

  input.disabled = false; btn.disabled = false; input.focus();
}
</script>
</body>
</html>
