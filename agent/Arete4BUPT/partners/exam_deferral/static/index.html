<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>缓考助手 · Partner Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1e1e2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --user-bg: #4f46e5;
      --user-text: #ffffff;
      --bot-bg: #f3f4f6;
      --bot-text: #1e1e2e;
      --tag: #ede9fe;
      --tag-text: #5b21b6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      padding: 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .brand-text h1 { font-size: 18px; font-weight: 600; }
    .brand-text p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .agent-meta { font-size: 12px; opacity: 0.9; text-align: right; }
    .agent-meta div { margin: 2px 0; }
    .agent-meta code {
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    main {
      flex: 1;
      display: flex;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }
    .chat-panel {
      flex: 1;
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }
    .msg.user .avatar { background: var(--user-bg); color: #fff; }
    .msg.bot .avatar { background: var(--tag); color: var(--tag-text); }
    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 14px;
      word-wrap: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
    }
    .bubble h1, .bubble h2, .bubble h3 {
      font-size: 15px;
      margin: 8px 0 6px;
      font-weight: 600;
    }
    .bubble h2 { font-size: 16px; }
    .bubble ol, .bubble ul { padding-left: 22px; margin: 6px 0; }
    .bubble li { margin: 4px 0; }
    .bubble table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
      width: 100%;
    }
    .bubble th, .bubble td {
      border: 1px solid var(--border);
      padding: 6px 10px;
    }
    .bubble th { background: #fafbfd; }
    .bubble code {
      background: rgba(0,0,0,0.06);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 13px;
    }
    .bubble strong { font-weight: 600; }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .skill-tag {
      background: var(--tag);
      color: var(--tag-text);
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .source-badge {
      font-size: 11px;
      color: var(--muted);
      margin-left: 8px;
    }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      background: #fbfbfd;
    }
    textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      min-height: 44px;
      max-height: 120px;
    }
    textarea:focus { border-color: var(--primary); }
    button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0 22px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }
    button:hover { background: var(--primary-dark); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .sidebar {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .card h3 {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .quick-q {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--bot-bg);
      color: var(--text);
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .quick-q:hover { background: var(--tag); color: var(--tag-text); }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin: 6px 0;
    }
    .info-row .label { color: var(--muted); }
    .info-row .value {
      font-family: "SF Mono", Consolas, monospace;
      color: var(--text);
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      margin-right: 6px;
    }

    .typing { display: flex; gap: 4px; padding: 8px 0; }
    .typing span {
      width: 8px;
      height: 8px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @media (max-width: 768px) {
      main { flex-direction: column; padding: 12px; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-icon">📚</div>
      <div class="brand-text">
        <h1>缓考助手</h1>
        <p>ACP 实训营 · Partner Agent</p>
      </div>
    </div>
    <div class="agent-meta">
      <div><span class="status-dot"></span>Online</div>
      <div>Agent: <code id="agent-id">deferred-exam-partner</code></div>
      <div>AIC: <code id="agent-aic">loading...</code></div>
    </div>
  </header>

  <main>
    <section class="chat-panel">
      <div id="messages" class="messages"></div>
      <div class="input-area">
        <textarea id="input" placeholder="请输入你的问题，例如：因病无法参加考试，怎么申请缓考？" rows="1"></textarea>
        <button id="send-btn" onclick="send()">发送</button>
      </div>
    </section>

    <aside class="sidebar">
      <div class="card">
        <h3>常见问题</h3>
        <button class="quick-q" onclick="ask(this.innerText)">因病无法参加考试，怎么申请缓考？</button>
        <button class="quick-q" onclick="ask(this.innerText)">缓考需要提交什么材料？截止日期？</button>
        <button class="quick-q" onclick="ask(this.innerText)">我有三门课要缓考，怎么处理？</button>
        <button class="quick-q" onclick="ask(this.innerText)">缓考和补考有什么区别？</button>
        <button class="quick-q" onclick="ask(this.innerText)">考试当天突然发烧了怎么办？</button>
        <button class="quick-q" onclick="ask(this.innerText)">我已经缺考了，还能补救吗？</button>
      </div>

      <div class="card">
        <h3>Agent 信息</h3>
        <div class="info-row"><span class="label">协议</span><span class="value">AIP</span></div>
        <div class="info-row"><span class="label">端点</span><span class="value">/rpc</span></div>
        <div class="info-row"><span class="label">技能数</span><span class="value">6</span></div>
        <div class="info-row"><span class="label">会话 ID</span><span class="value" id="session-display">-</span></div>
        <button class="quick-q" style="margin-top: 8px; text-align: center;" onclick="clearChat()">🗑 清空对话</button>
      </div>
    </aside>
  </main>

  <script>
    const SESSION_ID = "web-" + Math.random().toString(36).substring(2, 10);
    document.getElementById("session-display").textContent = SESSION_ID;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");

    fetch("/discover").then(r => r.json()).then(data => {
      if (data.aic) document.getElementById("agent-aic").textContent = data.aic;
    }).catch(() => {});

    function addMsg(role, content, meta) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const avatar = role === "user" ? "👤" : "📚";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = role === "bot" ? marked.parse(content) : escapeHtml(content);

      if (meta && meta.skills && meta.skills.length) {
        const tagWrap = document.createElement("div");
        tagWrap.className = "skill-tags";
        meta.skills.forEach(s => {
          const t = document.createElement("span");
          t.className = "skill-tag";
          t.textContent = s;
          tagWrap.appendChild(t);
        });
        if (meta.source) {
          const src = document.createElement("span");
          src.className = "source-badge";
          src.textContent = "· " + meta.source;
          tagWrap.appendChild(src);
        }
        bubble.appendChild(tagWrap);
      }

      wrap.innerHTML = `<div class="avatar">${avatar}</div>`;
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function addTyping() {
      const wrap = document.createElement("div");
      wrap.className = "msg bot";
      wrap.id = "typing-msg";
      wrap.innerHTML = '<div class="avatar">📚</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing-msg");
      if (el) el.remove();
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function send() {
      const query = inputEl.value.trim();
      if (!query) return;
      inputEl.value = "";
      sendBtn.disabled = true;
      addMsg("user", query);
      addTyping();

      try {
        const resp = await fetch("/test", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, session_id: SESSION_ID }),
        });
        const data = await resp.json();
        removeTyping();
        addMsg("bot", data.answer || "(无响应)", {
          skills: data.skills_used || [],
          source: data.source || "",
        });
      } catch (e) {
        removeTyping();
        addMsg("bot", "❌ 请求失败：" + e.message);
      }
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function ask(q) {
      inputEl.value = q;
      send();
    }

    function clearChat() {
      messagesEl.innerHTML = "";
      addMsg("bot",
        "你好！我是 **缓考助手** ✨\n\n我可以帮你解答缓考申请相关的所有问题。点击右侧常见问题快速开始，或在下方输入你的问题。",
        { skills: ["general_query"], source: "welcome" }
      );
    }

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "44px";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    clearChat();
    inputEl.focus();
  </script>
</body>
</html>
